<!doctype html>
<html class="page" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Самый лучший фитнес-центр Pulse" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/index.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link rel="shortcut icon" type="image/x-icon" href="./icons/logo-gym.svg" />
    <script
      src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"
      defer
    ></script>

    <script src="./js/index.js" type="module"></script>
    <script src="./js/fslightbox.js" type="module"></script>
    <title>PULSE FITNESS CENTER</title>
  </head>
  <body class="page__body">
    <header class="header">
      <div class="container header__container">
        <a class="header__logo" href="#">
          <img src="./icons/logo.svg" alt="оранжевый логотип компании" />
        </a>

        <nav id="home" class="header__menu menu" aria-label="Главное меню">
          <ul class="menu__list">
            <li class="menu__item hover-before">
              <a class="menu__link" href="#home">HOME</a>
            </li>
            <li class="menu__item hover-before">
              <a class="menu__link" href="#catalogs">CATALOGS</a>
            </li>
            <li class="menu__item hover-before">
              <a class="menu__link" href="#blog">BLOG</a>
            </li>
            <li class="menu__item hover-before">
              <a class="menu__link" href="#collections">COLLECTIONS</a>
            </li>
            <li class="menu__item hover-before">
              <a class="menu__link" href="#contact-us">CONTACT US</a>
            </li>
          </ul>
        </nav>

        <div class="header__controls">
          <button
            class="header__controls-button"
            title="Корзина товаров"
            aria-label="Корзина товаров"
          >
            <svg class="header__controls-icon" width="38" height="33">
              <use href="./icons/header-controls.svg#cart"></use>
            </svg>
          </button>

          <button
            class="header__controls-button"
            title="Поиск по сайту"
            aria-label="Поиск по сайту"
          >
            <svg class="header__controls-icon" width="29" height="29">
              <use href="./icons/header-controls.svg#search"></use>
            </svg>
          </button>

          <button
            class="header__controls-button burger"
            title="Меню сайта"
            aria-label="Меню сайта"
          >
            <svg width="25" height="25">
              <use
                class="burger__icon-menu"
                href="./icons/header-controls.svg#burger"
              ></use>
              <use
                class="burger__icon-cross"
                href="./icons/header-controls.svg#cross"
              ></use>
            </svg>
          </button>
        </div>
      </div>
    </header>
    <main class="main"></main>
    <div class="footer">
      <div class="footer__container container">
        <a class="footer_logo" href="#">
          <img src="./icons/logo.svg" alt="" />
        </a>
        <h3 class="footer__title hover-before">POWER FROM WITHIN</h3>
      </div>
    </div>
  </body>
</html>
